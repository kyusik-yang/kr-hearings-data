<svg width="680" height="358" viewBox="0 0 680 358" xmlns="http://www.w3.org/2000/svg"
     font-family="'SFMono-Regular','Consolas','Liberation Mono',monospace">

  <!-- Window chrome -->
  <rect width="680" height="358" rx="12" fill="#181818" stroke="#404040" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="680" height="40" rx="12" fill="#2C2C2E"/>
  <rect x="0" y="28" width="680" height="12" fill="#2C2C2E"/>
  <line x1="0" y1="40" x2="680" y2="40" stroke="#444444" stroke-width="1"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="20" r="5.5" fill="#FF5F57"/>
  <circle cx="40" cy="20" r="5.5" fill="#FEBC2E"/>
  <circle cx="60" cy="20" r="5.5" fill="#28C840"/>

  <!-- Window title -->
  <text x="340" y="26" text-anchor="middle" font-size="12" fill="#6B7280">zsh - kr-hearings info</text>

  <!-- Shell prompt -->
  <text x="14" y="58" font-size="10.5">
    <tspan fill="#28C840">&#10095;</tspan>
    <tspan fill="#A0A0A0"> kr-hearings info</tspan>
  </text>

  <!-- ASCII art - 6 lines, purple gradient -->
  <text xml:space="preserve" x="14" y="76"  font-size="9" fill="#c084fc"> _            _                     _                 </text>
  <text xml:space="preserve" x="14" y="90"  font-size="9" fill="#b87df7">| | ___ __   | |__   ___  __ _ _ __(_)_ __   __ _ ___ </text>
  <text xml:space="preserve" x="14" y="104" font-size="9" fill="#ae76f2">| |/ / '__|  | '_ \ / _ \/ _` | '__| | '_ \ / _` / __|</text>
  <text xml:space="preserve" x="14" y="118" font-size="9" fill="#a46eed">|   &lt;| |     | | | |  __/ (_| | |  | | | | | (_| \__ \</text>
  <text xml:space="preserve" x="14" y="132" font-size="9" fill="#9a66e8">|_|\_\_|     |_| |_|\___|\__,_|_|  |_|_| |_|\__, |___/</text>
  <text xml:space="preserve" x="14" y="146" font-size="9" fill="#905ee3">                                              |___/  </text>

  <!-- Separator + header -->
  <line x1="14" y1="158" x2="666" y2="158" stroke="#2E2E2E" stroke-width="1"/>
  <text x="14" y="174" font-size="10.5">
    <tspan font-weight="700" fill="#a855f7">kr-hearings-data</tspan>
    <tspan fill="#444444">  ·  </tspan>
    <tspan fill="#5A5A5A">Korean National Assembly Hearings Dataset</tspan>
  </text>
  <line x1="14" y1="184" x2="666" y2="184" stroke="#2E2E2E" stroke-width="1"/>

  <!-- Stats -->
  <text x="14" y="204" font-size="10">
    <tspan fill="#555555">  speeches    </tspan>
    <tspan font-weight="700" fill="#DDDDDD">9,906,444</tspan>
    <tspan fill="#555555">    16,830 meetings across 6 hearing types</tspan>
  </text>
  <text x="14" y="220" font-size="10">
    <tspan fill="#555555">  dyads        </tspan>
    <tspan font-weight="700" fill="#DDDDDD">7,429,413</tspan>
    <tspan fill="#555555">    legislator-witness Q&amp;A pairs</tspan>
  </text>
  <text x="14" y="236" font-size="10">
    <tspan fill="#555555">  period       </tspan>
    <tspan font-weight="700" fill="#DDDDDD">2000 ~ 2025</tspan>
    <tspan fill="#555555">   16th-22nd National Assembly</tspan>
  </text>

  <!-- Separator -->
  <line x1="14" y1="252" x2="666" y2="252" stroke="#2E2E2E" stroke-width="1"/>

  <!-- Usage -->
  <text x="14" y="272" font-size="10.5">
    <tspan font-weight="700" fill="#a855f7">Usage</tspan>
  </text>

  <text x="14" y="290" font-size="10">
    <tspan fill="#555555">  </tspan>
    <tspan fill="#a855f7">&#8594;  </tspan>
    <tspan fill="#555555">Download parquet from </tspan>
    <tspan font-weight="700" fill="#58A6FF">GitHub Releases</tspan>
  </text>

  <text x="14" y="306" font-size="10">
    <tspan fill="#555555">  </tspan>
    <tspan fill="#a855f7">&#8594;  </tspan>
    <tspan fill="#DDDDDD">pd.read_parquet</tspan>
    <tspan fill="#555555">(</tspan>
    <tspan fill="#98C379">"all_speeches_16_22_v9.parquet"</tspan>
    <tspan fill="#555555">)</tspan>
  </text>

  <!-- Footer prompt -->
  <text x="14" y="337" font-size="10.5">
    <tspan fill="#28C840">&#10095;</tspan>
  </text>

  <!-- Blinking cursor -->
  <rect x="26" y="326" width="7" height="13" fill="#a855f7" rx="1">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

</svg>
