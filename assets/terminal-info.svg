<svg width="680" height="240" viewBox="0 0 680 240" xmlns="http://www.w3.org/2000/svg"
     font-family="'SFMono-Regular','Consolas','Liberation Mono',monospace">

  <!-- Window chrome -->
  <rect width="680" height="240" rx="12" fill="#181818" stroke="#404040" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="680" height="40" rx="12" fill="#2C2C2E"/>
  <rect x="0" y="28" width="680" height="12" fill="#2C2C2E"/>
  <line x1="0" y1="40" x2="680" y2="40" stroke="#444444" stroke-width="1"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="20" r="5.5" fill="#FF5F57"/>
  <circle cx="40" cy="20" r="5.5" fill="#FEBC2E"/>
  <circle cx="60" cy="20" r="5.5" fill="#28C840"/>

  <!-- Window title -->
  <text x="340" y="26" text-anchor="middle" font-size="12" fill="#6B7280">kr-hearings-data info</text>

  <!-- Shell prompt -->
  <text x="14" y="62" font-size="10.5">
    <tspan fill="#28C840">&#10095;</tspan>
    <tspan fill="#A0A0A0"> kr-hearings info</tspan>
  </text>

  <!-- Header -->
  <text x="14" y="86" font-size="10.5">
    <tspan font-weight="700" fill="#a855f7">kr-hearings-data</tspan>
    <tspan fill="#444444">  ·  </tspan>
    <tspan fill="#5A5A5A">Korean National Assembly Hearings Dataset</tspan>
  </text>
  <line x1="14" y1="96" x2="666" y2="96" stroke="#2E2E2E" stroke-width="1"/>

  <!-- Stats -->
  <text x="14" y="116" font-size="10">
    <tspan fill="#5e5e72">  speeches    </tspan>
    <tspan font-weight="700" fill="#c5c8c6">9,906,444</tspan>
    <tspan fill="#444444">    </tspan>
    <tspan fill="#5e5e72">16,830 meetings  ·  6 hearing types</tspan>
  </text>

  <text x="14" y="134" font-size="10">
    <tspan fill="#5e5e72">  dyads        </tspan>
    <tspan font-weight="700" fill="#c5c8c6">7,429,413</tspan>
    <tspan fill="#444444">    </tspan>
    <tspan fill="#5e5e72">legislator-witness Q&amp;A pairs</tspan>
  </text>

  <text x="14" y="152" font-size="10">
    <tspan fill="#5e5e72">  period       </tspan>
    <tspan font-weight="700" fill="#c5c8c6">2000-06 ~ 2025-07</tspan>
    <tspan fill="#444444">    </tspan>
    <tspan fill="#5e5e72">16th-22nd National Assembly</tspan>
  </text>

  <text x="14" y="170" font-size="10">
    <tspan fill="#5e5e72">  columns      </tspan>
    <tspan font-weight="700" fill="#c5c8c6">28</tspan>
    <tspan fill="#5e5e72"> speeches  </tspan>
    <tspan font-weight="700" fill="#c5c8c6">25</tspan>
    <tspan fill="#5e5e72"> dyads  ·  33 speaker roles  ·  20 committees</tspan>
  </text>

  <!-- Separator -->
  <line x1="14" y1="184" x2="666" y2="184" stroke="#2E2E2E" stroke-width="1"/>

  <!-- Footer -->
  <text x="14" y="204" font-size="10">
    <tspan fill="#5e5e72">  see </tspan>
    <tspan fill="#58A6FF">docs/CODEBOOK.md</tspan>
    <tspan fill="#5e5e72"> for full column definitions and value distributions</tspan>
  </text>

  <!-- Prompt -->
  <text x="14" y="225" font-size="10.5">
    <tspan fill="#28C840">&#10095;</tspan>
  </text>

  <!-- Blinking cursor -->
  <rect x="26" y="214" width="7" height="13" fill="#a855f7" rx="1">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

</svg>
