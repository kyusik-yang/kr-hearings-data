<svg width="680" height="390" viewBox="0 0 680 390" xmlns="http://www.w3.org/2000/svg"
     font-family="'SFMono-Regular','Consolas','Liberation Mono',monospace">

  <!-- Window chrome -->
  <rect width="680" height="390" rx="12" fill="#181818" stroke="#404040" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="680" height="40" rx="12" fill="#2C2C2E"/>
  <rect x="0" y="28" width="680" height="12" fill="#2C2C2E"/>
  <line x1="0" y1="40" x2="680" y2="40" stroke="#444444" stroke-width="1"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="20" r="5.5" fill="#FF5F57"/>
  <circle cx="40" cy="20" r="5.5" fill="#FEBC2E"/>
  <circle cx="60" cy="20" r="5.5" fill="#28C840"/>

  <!-- Window title -->
  <text x="340" y="26" text-anchor="middle" font-size="12" fill="#6B7280">zsh - kr-hearings-data v8</text>

  <!-- Shell prompt -->
  <text x="14" y="62" font-size="10.5">
    <tspan fill="#28C840">&#10095;</tspan>
    <tspan fill="#A0A0A0"> kr-hearings-data info</tspan>
  </text>

  <!-- Dataset name block -->
  <text x="14" y="90" font-size="16" font-weight="700" fill="#a855f7">kr-hearings-data</text>
  <text x="14" y="108" font-size="10.5" fill="#5e5e72">Korean National Assembly Hearings Data</text>

  <!-- Version badge -->
  <rect x="172" y="76" rx="4" width="30" height="18" fill="rgba(168,85,247,0.15)" stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
  <text x="187" y="89" text-anchor="middle" font-size="9" font-weight="600" fill="#c084fc">v8</text>

  <!-- Separator -->
  <line x1="14" y1="120" x2="666" y2="120" stroke="#2E2E2E" stroke-width="1"/>

  <!-- Description -->
  <text x="14" y="140" font-size="10" fill="#888888">Speech-level dataset from National Assembly committee proceedings.</text>
  <text x="14" y="156" font-size="10" fill="#888888">국회 위원회 회의록 발언 단위 데이터셋.</text>

  <!-- Separator -->
  <line x1="14" y1="172" x2="666" y2="172" stroke="#2E2E2E" stroke-width="1"/>

  <!-- Stats header -->
  <text x="14" y="192" font-size="10.5">
    <tspan fill="#22d3ee" font-weight="700">OVERVIEW</tspan>
  </text>

  <!-- Stats grid: Row 1 -->
  <!-- Stat 1: Speeches -->
  <rect x="14" y="204" rx="6" width="154" height="68" fill="rgba(168,85,247,0.06)" stroke="rgba(168,85,247,0.15)" stroke-width="1"/>
  <text x="91" y="232" text-anchor="middle" font-size="22" font-weight="700" fill="#a855f7">9.9M+</text>
  <text x="91" y="252" text-anchor="middle" font-size="9" fill="#5e5e72" text-transform="uppercase" letter-spacing="1">SPEECHES</text>

  <!-- Stat 2: Meetings -->
  <rect x="180" y="204" rx="6" width="154" height="68" fill="rgba(34,211,238,0.06)" stroke="rgba(34,211,238,0.15)" stroke-width="1"/>
  <text x="257" y="232" text-anchor="middle" font-size="22" font-weight="700" fill="#22d3ee">16,830</text>
  <text x="257" y="252" text-anchor="middle" font-size="9" fill="#5e5e72" letter-spacing="1">MEETINGS</text>

  <!-- Stat 3: Hearing types -->
  <rect x="346" y="204" rx="6" width="154" height="68" fill="rgba(74,222,128,0.06)" stroke="rgba(74,222,128,0.15)" stroke-width="1"/>
  <text x="423" y="232" text-anchor="middle" font-size="22" font-weight="700" fill="#4ade80">6</text>
  <text x="423" y="252" text-anchor="middle" font-size="9" fill="#5e5e72" letter-spacing="1">HEARING TYPES</text>

  <!-- Stat 4: Assembly coverage -->
  <rect x="512" y="204" rx="6" width="154" height="68" fill="rgba(251,146,60,0.06)" stroke="rgba(251,146,60,0.15)" stroke-width="1"/>
  <text x="589" y="228" text-anchor="middle" font-size="18" font-weight="700" fill="#fb923c">16th-22nd</text>
  <text x="589" y="252" text-anchor="middle" font-size="9" fill="#5e5e72" letter-spacing="1">ASSEMBLY</text>

  <!-- Separator -->
  <line x1="14" y1="286" x2="666" y2="286" stroke="#2E2E2E" stroke-width="1"/>

  <!-- Hearing types header -->
  <text x="14" y="306" font-size="10.5">
    <tspan fill="#22d3ee" font-weight="700">HEARING TYPES</tspan>
  </text>

  <!-- Hearing type tags: Row 1 -->
  <!-- 상임위원회 (5 chars) -->
  <rect x="14" y="316" rx="4" width="68" height="22" fill="rgba(168,85,247,0.1)" stroke="rgba(168,85,247,0.2)" stroke-width="1"/>
  <text x="48" y="331" text-anchor="middle" font-size="9" fill="#c084fc">상임위원회</text>

  <!-- 국정감사 (4 chars) -->
  <rect x="92" y="316" rx="4" width="58" height="22" fill="rgba(168,85,247,0.1)" stroke="rgba(168,85,247,0.2)" stroke-width="1"/>
  <text x="121" y="331" text-anchor="middle" font-size="9" fill="#c084fc">국정감사</text>

  <!-- 인사청문특별위원회 (9 chars) -->
  <rect x="160" y="316" rx="4" width="110" height="22" fill="rgba(168,85,247,0.1)" stroke="rgba(168,85,247,0.2)" stroke-width="1"/>
  <text x="215" y="331" text-anchor="middle" font-size="9" fill="#c084fc">인사청문특별위원회</text>

  <!-- 국정조사 (4 chars) -->
  <rect x="280" y="316" rx="4" width="58" height="22" fill="rgba(168,85,247,0.1)" stroke="rgba(168,85,247,0.2)" stroke-width="1"/>
  <text x="309" y="331" text-anchor="middle" font-size="9" fill="#c084fc">국정조사</text>

  <!-- 예산결산특별위원회 (9 chars) -->
  <rect x="348" y="316" rx="4" width="110" height="22" fill="rgba(168,85,247,0.1)" stroke="rgba(168,85,247,0.2)" stroke-width="1"/>
  <text x="403" y="331" text-anchor="middle" font-size="9" fill="#c084fc">예산결산특별위원회</text>

  <!-- 국회본회의 (5 chars) -->
  <rect x="468" y="316" rx="4" width="68" height="22" fill="rgba(168,85,247,0.1)" stroke="rgba(168,85,247,0.2)" stroke-width="1"/>
  <text x="502" y="331" text-anchor="middle" font-size="9" fill="#c084fc">국회본회의</text>

  <!-- Separator -->
  <line x1="14" y1="350" x2="666" y2="350" stroke="#2E2E2E" stroke-width="1"/>

  <!-- Footer with GitHub link and author -->
  <text x="14" y="370" font-size="10">
    <tspan fill="#28C840">&#10095;</tspan>
    <tspan fill="#5e5e72"> github.com/</tspan><tspan fill="#a855f7">kyusik-yang</tspan><tspan fill="#5e5e72">/</tspan><tspan fill="#22d3ee">kr-hearings-data</tspan>
  </text>

  <!-- Blinking cursor -->
  <rect x="358" y="359" width="7" height="13" fill="#a855f7" rx="1">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

</svg>